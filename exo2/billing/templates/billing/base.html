<!DOCTYPE html>
<html lang="fr">
<head>
  {% load static %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Produits{% endblock %} — Facturation</title>
  <link rel="stylesheet" href="{% static 'billing/styles.css' %}">
</head>
<body>
  <div class="container">
    <nav>
      <a href="{% url 'billing:product_list' %}">Liste des produits</a>
      <a href="{% url 'billing:product_create' %}">Nouveau produit</a>
      <a href="{% url 'billing:invoice_list' %}">Factures</a>
      <a href="{% url 'billing:invoice_create' %}">Nouvelle facture</a>
    </nav>

    {% if messages %}
    <ul class="messages">
      {% for message in messages %}
      <li>{{ message }}</li>
      {% endfor %}
    </ul>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
