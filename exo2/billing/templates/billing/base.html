<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Produits{% endblock %} — Facturation</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 56rem; margin: 1.5rem auto; padding: 0 1rem; }
    nav { margin-bottom: 1.5rem; }
    nav a { margin-right: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #ccc; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f5f5f5; }
    .messages { list-style: none; padding: 0; }
    .messages li { padding: 0.5rem; margin-bottom: 0.5rem; background: #e8f5e9; border: 1px solid #c8e6c9; }
    .pagination { margin-top: 1rem; }
    .pagination a { margin-right: 0.5rem; }
    button, .button { display: inline-block; padding: 0.35rem 0.75rem; cursor: pointer; }
    form p { margin: 0.75rem 0; }
    label { display: inline-block; min-width: 8rem; }
  </style>
</head>
<body>
  <nav>
    <a href="{% url 'billing:product_list' %}">Liste des produits</a>
    <a href="{% url 'billing:product_create' %}">Nouveau produit</a>
  </nav>

  {% if messages %}
  <ul class="messages">
    {% for message in messages %}
    <li>{{ message }}</li>
    {% endfor %}
  </ul>
  {% endif %}

  {% block content %}{% endblock %}
</body>
</html>
